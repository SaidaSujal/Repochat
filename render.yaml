services:
  - type: web
    name: repochat-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: FRONTEND_URL
        value: http://localhost:3000
      - key: GEMINI_API_KEY
        sync: true
      - key: GITHUB_TOKEN
        sync: true
